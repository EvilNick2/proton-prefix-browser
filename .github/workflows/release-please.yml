name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-asset:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build plugin
        run: bun run build

      - name: Stage release files
        run: |
          mkdir -p _release/proton-prefix-browser
          cp plugin.json _release/proton-prefix-browser/
          cp README.md _release/proton-prefix-browser/
          cp LICENSE _release/proton-prefix-browser/
          cp -r backend _release/proton-prefix-browser/
          cp -r .millennium _release/proton-prefix-browser/

      - name: Create zip archive
        run: |
          cd _release
          zip -r "../proton-prefix-browser-${{ needs.release-please.outputs.tag_name }}.zip" proton-prefix-browser

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: proton-prefix-browser-*.zip
          token: ${{ secrets.GITHUB_TOKEN }}
